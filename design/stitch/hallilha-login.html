<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الدخول - حليلة</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

                        "status-suspicious": "#F59E0B",

                        "inverse-on-surface": "#2e312f",
                        "outline": "#89938d",
                        "on-primary-fixed": "#002117",
                        "on-primary-container": "#80bea6",
                        "tertiary-fixed": "#ffdad5",
                        "surface-tint": "#95d3ba",
                        "accent-gold": "#D4AF37",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#53211b",
                        "on-background": "#e1e3e0",

                        "error-container": "#93000a",
                        "on-secondary-fixed": "#0b1c30",
                        "secondary-fixed-dim": "#b7c8e1",

                        "surface-container-highest": "#323533",
                        "on-tertiary-fixed": "#380d08",
                        "on-surface": "#e1e3e0",

                        "primary-fixed-dim": "#95d3ba",
                        "on-error": "#690005",
                        "tertiary": "#ffb4a9",
                        "tertiary-container": "#6b342d",
                        "status-halal": "#10B981",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-page": "2rem",
                        "stack-sm": "0.5rem",
                        "stack-lg": "2rem",
                        "stack-md": "1rem",
                        "gutter": "1.5rem",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "display": ["Almarai"],
                        "h1": ["Almarai"],
                        "label-sm": ["Almarai"],
                        "h2": ["Almarai"],
                        "body-lg": ["Almarai"],
                        "body-md": ["Almarai"]
                    },
                    "fontSize": {
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h1": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "h2": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-navy text-on-background min-h-screen flex items-center justify-center font-body-md text-body-md relative overflow-hidden antialiased">
<!-- Decorative Background Overlay -->
<div class="absolute inset-0 z-0 opacity-[0.03] mix-blend-overlay pointer-events-none" data-alt="subtle dark geometric islamic pattern texture seamlessly repeating across the dark navy background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAZYt0xs9KMPTTls7qUb7mGbODi-med3z-YrgsKOOc631RwsCtv9eCTl2vNLsgbeQdEEbOsnhi8kAbzAzQ5chkc3ky6wDeJQxrzSIArQQS2nu_mPFqqX6q5qr2NfUQE3EEyvg919gmYrPnoOq4NLm3mnegJiJ9k45Yj6p7nY4YezP7sUcjjp2mM0TuQqtmfa_NbhvAHY-rgAQqa26yXS39LbjQk_5iC6ej7vbegU19jAMEjzyYQC6bdHKa5uAfZQKxqiXbSI4xyiAg'); background-size: cover; background-position: center;">
</div>
<!-- Subtle Gradient Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Container -->
<main class="w-full max-w-[420px] px-gutter relative z-10">
<!-- Glassmorphic Card -->
<div class="bg-surface-glass backdrop-blur-2xl border border-white/10 rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.4)] p-8 md:p-10 flex flex-col gap-stack-lg">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-stack-sm">
<div class="w-16 h-16 flex items-center justify-center mb-2">
<img alt="Hallilha Logo" class="max-w-full max-h-full object-contain" data-alt="Hallilha Fintech official company logo, modern minimalist design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7SyUUORPRA3jsQF8e7A1nsPCz13Nun2GeXidwk6kTRbNydweaYiQsS3t2DXoqtowmNPv4pr0kIwYgXX9wl2jOyIWrjPHLYmQHC74bbKw76qf67svkxXvnBR3p3WMX6B3HSnNZ-orhG4XuVndhSUOOfACj3SIsRdzyAuPT8zsJODoFJkaknlSeWI1aKVcYY--DjzOa-lCt322_pvjzPNZzzFh1p4Alzl9LMHbLY4pXOAs_u1KQsqizt1CXdkQz77ZSEG0-R1kG5xY"/>
</div>
<h1 class="font-h2 text-h2 text-on-surface">مرحباً بعودتك</h1>
<p class="font-body-md text-body-md text-on-surface-variant">سجل الدخول إلى لوحة التحكم المتوافقة الخاصة بك</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface" for="email">عنوان البريد الإلكتروني</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-lg pr-10 pl-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-baseline">
<label class="font-label-sm text-label-sm text-on-surface" for="password">كلمة المرور</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">هل نسيت كلمة المرور؟</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-lg pr-10 pl-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full bg-accent-gold text-[#4A3B00] font-label-sm text-label-sm font-bold py-3.5 px-6 rounded-lg shadow-[0_0_15px_rgba(212,175,55,0.15)] hover:shadow-[0_0_25px_rgba(212,175,55,0.3)] hover:-translate-y-[1px] transition-all flex items-center justify-center gap-2" type="submit">
                    تسجيل الدخول
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="text-center font-body-md text-body-md text-on-surface-variant">
                مستخدم جديد في حليلة؟ 
                <a class="text-primary hover:text-primary-fixed font-medium transition-colors mr-1" href="#">سجل الآن</a>
</div>
<!-- Trust Badges -->
<div class="mt-4 pt-6 border-t border-white/5 flex items-center justify-center gap-6">
<div class="flex items-center gap-1.5 text-on-surface-variant/60 font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px] filled">verified</span>
<span>معتمد شرعياً</span>
</div>
<div class="flex items-center gap-1.5 text-on-surface-variant/60 font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px] filled">shield</span>
<span>تشفير آمن 256-بت</span>
</div>
</div>
</div>
</main>
</body></html>
