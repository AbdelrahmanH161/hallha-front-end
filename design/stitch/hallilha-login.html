<!doctype html>

<html class="dark" dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>تسجيل الدخول - حللّها</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-glass": "rgba(30, 41, 59, 0.7)",
              surface: "#111412",
              "secondary-fixed": "#d3e4fe",
              "surface-container-high": "#272b29",
              "on-primary": "#003829",
              background: "#111412",
              "surface-container-lowest": "#0c0f0d",
              "tertiary-fixed-dim": "#ffb4a9",
              "on-secondary-container": "#a9bad3",
              "surface-dim": "#111412",
              "surface-bright": "#373a38",
              "surface-container-low": "#191c1b",
              "status-suspicious": "#F59E0B",
              error: "#ffb4ab",
              "primary-fixed": "#b0f0d6",
              "inverse-primary": "#2b6954",
              "primary-container": "#064e3b",
              "inverse-surface": "#e1e3e0",
              "status-noncompliant": "#EF4444",
              "secondary-container": "#3a4a5f",
              "outline-variant": "#404944",
              secondary: "#b7c8e1",
              primary: "#95d3ba",
              "on-tertiary-container": "#ea9e93",
              "on-tertiary-fixed-variant": "#6e372f",
              "inverse-on-surface": "#2e312f",
              outline: "#89938d",
              "on-primary-fixed": "#002117",
              "on-primary-container": "#80bea6",
              "tertiary-fixed": "#ffdad5",
              "surface-tint": "#95d3ba",
              "accent-gold": "#D4AF37",
              "on-error-container": "#ffdad6",
              "on-tertiary": "#53211b",
              "on-background": "#e1e3e0",
              "background-navy": "#0F172A",
              "error-container": "#93000a",
              "on-secondary-fixed": "#0b1c30",
              "secondary-fixed-dim": "#b7c8e1",
              "on-secondary-fixed-variant": "#38485d",
              "on-secondary": "#213145",
              "surface-variant": "#323533",
              "surface-container-highest": "#323533",
              "on-tertiary-fixed": "#380d08",
              "on-surface": "#e1e3e0",
              "on-primary-fixed-variant": "#0b513d",
              "primary-fixed-dim": "#95d3ba",
              "on-error": "#690005",
              tertiary: "#ffb4a9",
              "tertiary-container": "#6b342d",
              "status-halal": "#10B981",
              "on-surface-variant": "#bfc9c3",
              "surface-container": "#1d201e",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "margin-page": "2rem",
              "stack-sm": "0.5rem",
              "stack-lg": "2rem",
              "stack-md": "1rem",
              gutter: "1.5rem",
              "container-max": "1280px",
            },
            fontFamily: {
              display: ["Almarai"],
              h1: ["Almarai"],
              "label-sm": ["Almarai"],
              h2: ["Almarai"],
              "body-lg": ["Almarai"],
              "body-md": ["Almarai"],
            },
            fontSize: {
              display: [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              h1: ["32px", { lineHeight: "1.3", fontWeight: "600" }],
              "label-sm": [
                "13px",
                {
                  lineHeight: "1.4",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              h2: ["24px", { lineHeight: "1.4", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .material-symbols-outlined.filled {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-navy text-on-background font-body-md text-body-md relative flex min-h-screen items-center justify-center overflow-hidden antialiased"
  >
    <!-- Decorative Background Overlay -->
    <div
      class="pointer-events-none absolute inset-0 z-0 opacity-[0.03] mix-blend-overlay"
      data-alt="subtle dark geometric islamic pattern texture seamlessly repeating across the dark navy background"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuAZYt0xs9KMPTTls7qUb7mGbODi-med3z-YrgsKOOc631RwsCtv9eCTl2vNLsgbeQdEEbOsnhi8kAbzAzQ5chkc3ky6wDeJQxrzSIArQQS2nu_mPFqqX6q5qr2NfUQE3EEyvg919gmYrPnoOq4NLm3mnegJiJ9k45Yj6p7nY4YezP7sUcjjp2mM0TuQqtmfa_NbhvAHY-rgAQqa26yXS39LbjQk_5iC6ej7vbegU19jAMEjzyYQC6bdHKa5uAfZQKxqiXbSI4xyiAg&quot;);
        background-size: cover;
        background-position: center;
      "
    ></div>
    <!-- Subtle Gradient Glows -->
    <div
      class="bg-primary-container/20 pointer-events-none absolute top-[-10%] left-[-10%] h-[50%] w-[50%] rounded-full blur-[120px]"
    ></div>
    <div
      class="bg-secondary-container/20 pointer-events-none absolute right-[-10%] bottom-[-10%] h-[50%] w-[50%] rounded-full blur-[120px]"
    ></div>
    <!-- Login Container -->
    <main class="px-gutter relative z-10 w-full max-w-[420px]">
      <!-- Glassmorphic Card -->
      <div
        class="bg-surface-glass gap-stack-lg flex flex-col rounded-xl border border-white/10 p-8 shadow-[0_20px_40px_rgba(0,0,0,0.4)] backdrop-blur-2xl md:p-10"
      >
        <!-- Header -->
        <header class="gap-stack-sm flex flex-col items-center text-center">
          <div class="mb-2 flex h-16 w-16 items-center justify-center">
            <img
              alt="Hallilha Logo"
              class="max-h-full max-w-full object-contain"
              data-alt="Hallilha Fintech official company logo, modern minimalist design"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7SyUUORPRA3jsQF8e7A1nsPCz13Nun2GeXidwk6kTRbNydweaYiQsS3t2DXoqtowmNPv4pr0kIwYgXX9wl2jOyIWrjPHLYmQHC74bbKw76qf67svkxXvnBR3p3WMX6B3HSnNZ-orhG4XuVndhSUOOfACj3SIsRdzyAuPT8zsJODoFJkaknlSeWI1aKVcYY--DjzOa-lCt322_pvjzPNZzzFh1p4Alzl9LMHbLY4pXOAs_u1KQsqizt1CXdkQz77ZSEG0-R1kG5xY"
            />
          </div>
          <h1 class="font-h2 text-h2 text-on-surface">مرحباً بعودتك</h1>
          <p class="font-body-md text-body-md text-on-surface-variant">
            سجل الدخول إلى لوحة التحكم المتوافقة الخاصة بك
          </p>
        </header>
        <!-- Form -->
        <form action="#" class="gap-stack-md flex flex-col" method="POST">
          <!-- Email Field -->
          <div class="flex flex-col gap-2">
            <label
              class="font-label-sm text-label-sm text-on-surface"
              for="email"
              >عنوان البريد الإلكتروني</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined text-on-surface-variant/50 absolute top-1/2 right-3 -translate-y-1/2 text-[20px]"
                >mail</span
              >
              <input
                class="bg-surface-container-low border-outline-variant text-on-surface font-body-md text-body-md placeholder:text-on-surface-variant/40 w-full rounded-lg border py-3 pr-10 pl-4 transition-colors focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none"
                id="email"
                name="email"
                placeholder="name@company.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="flex flex-col gap-2">
            <div class="flex items-baseline justify-between">
              <label
                class="font-label-sm text-label-sm text-on-surface"
                for="password"
                >كلمة المرور</label
              >
              <a
                class="font-label-sm text-label-sm hover:text-primary-fixed text-primary transition-colors"
                href="#"
                >هل نسيت كلمة المرور؟</a
              >
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined text-on-surface-variant/50 absolute top-1/2 right-3 -translate-y-1/2 text-[20px]"
                >lock</span
              >
              <input
                class="bg-surface-container-low border-outline-variant text-on-surface font-body-md text-body-md placeholder:text-on-surface-variant/40 w-full rounded-lg border py-3 pr-10 pl-4 transition-colors focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
            </div>
          </div>
          <!-- Submit Button -->
          <button
            class="bg-accent-gold font-label-sm text-label-sm mt-2 flex w-full items-center justify-center gap-2 rounded-lg px-6 py-3.5 font-bold text-[#4A3B00] shadow-[0_0_15px_rgba(212,175,55,0.15)] transition-all hover:-translate-y-[1px] hover:shadow-[0_0_25px_rgba(212,175,55,0.3)]"
            type="submit"
          >
            تسجيل الدخول
            <span class="material-symbols-outlined text-[18px]"
              >arrow_back</span
            >
          </button>
        </form>
        <!-- Sign Up Link -->
        <div
          class="font-body-md text-body-md text-on-surface-variant text-center"
        >
          مستخدم جديد في حللّها؟
          <a
            class="hover:text-primary-fixed mr-1 font-medium text-primary transition-colors"
            href="#"
            >سجل الآن</a
          >
        </div>
        <!-- Trust Badges -->
        <div
          class="mt-4 flex items-center justify-center gap-6 border-t border-white/5 pt-6"
        >
          <div
            class="text-on-surface-variant/60 font-label-sm text-label-sm flex items-center gap-1.5"
          >
            <span class="material-symbols-outlined filled text-[16px]"
              >verified</span
            >
            <span>معتمد شرعياً</span>
          </div>
          <div
            class="text-on-surface-variant/60 font-label-sm text-label-sm flex items-center gap-1.5"
          >
            <span class="material-symbols-outlined filled text-[16px]"
              >shield</span
            >
            <span>تشفير آمن 256-بت</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
